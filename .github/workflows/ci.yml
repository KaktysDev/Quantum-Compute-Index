name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm --prefix sdk/typescript run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/simulator/requirements-ci.txt
      - run: pip install -r services/simulator/requirements-ci.txt
      - run: PYTHONPATH=services/simulator python -m unittest discover -s services/simulator -p 'test_*.py' -v
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: local
          NEXT_PUBLIC_SUPABASE_ANON_KEY: local
