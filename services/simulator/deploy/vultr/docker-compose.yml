services:
  worker:
    image: ${QROUTER_WORKER_IMAGE}
    restart: unless-stopped
    gpus: all
    env_file: ${QROUTER_ENV_FILE:-.env}
    environment:
      JOB_DB_PATH: /var/lib/qrouter/jobs.sqlite3
    expose:
      - "8080"
    volumes:
      - qrouter-jobs:/var/lib/qrouter
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    depends_on:
      worker:
        condition: service_healthy
    environment:
      WORKER_DOMAIN: ${WORKER_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  qrouter-jobs:
  caddy-data:
  caddy-config:
